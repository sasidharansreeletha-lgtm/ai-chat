<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Mobile Workspace - V4 Memory Matrix</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        :root {
            --bg-body: #070a13;
            --bg-sidebar: #0f1423;
            --bg-header: #13192e;
            --border-color: #1e294b;
            --text-main: #f8fafc;
            --text-sub: #64748b;
            --bg-chat: #070a13;
            --bg-input-panel: #13192e;
            --bg-input: #0b0f19;
            --msg-user: #1d4ed8;
            --msg-user-text: #ffffff;
            --msg-ai: #1e293b;
            --msg-ai-text: #f1f5f9;
            --msg-ai-border: rgba(59, 130, 246, 0.2);
            --accent: #3b82f6;
            --glow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        [data-theme="light"] {
            --bg-body: #ffffff;
            --bg-sidebar: #f3f4f6;
            --bg-header: #f8f9fa;
            --border-color: #dadce0;
            --text-main: #202124;
            --text-sub: #5f6368;
            --bg-chat: #ffffff;
            --bg-input-panel: #f8f9fa;
            --bg-input: #ffffff;
            --msg-user: #1a73e8;
            --msg-user-text: #ffffff;
            --msg-ai: #f1f3f4;
            --msg-ai-text: #202124;
            --msg-ai-border: transparent;
            --accent: #1a73e8;
            --glow: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            overflow: hidden;
        }

        #sidebar {
            width: 260px;
            height: 100%;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: absolute;
            left: -260px;
            z-index: 10;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #sidebar.open { left: 0; box-shadow: 5px 0 25px rgba(0,0,0,0.5); }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .new-chat-btn {
            width: 100%;
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            box-shadow: var(--glow);
        }

        .sidebar-content { flex: 1; overflow-y: auto; padding: 12px; }

        .chat-history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--text-sub);
        }

        .chat-history-item:hover, .chat-history-item.active {
            background-color: var(--bg-input-panel);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .delete-chat-btn { background: transparent; border: none; color: #ef4444; cursor: pointer; font-size: 14px; font-weight: bold; }

        #main-workspace { flex: 1; display: flex; flex-direction: column; width: 100%; height: 100%; position: relative; }

        header {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-btn { background: transparent; border: none; color: var(--text-main); font-size: 20px; cursor: pointer; }
        header h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; text-shadow: var(--glow); }

        .header-right { display: flex; gap: 8px; }

        #theme-toggle, #system-prompt-toggle, #model-selector {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            outline: none;
        }

        #chat-container {
            flex: 1;
            width: 100%;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        .message-content { user-select: text; -webkit-user-select: text; }
        
        .message-content pre { background: #000; padding: 10px; border-radius: 8px; overflow-x: auto; margin: 8px 0; font-family: monospace; }
        .message-content code { font-family: monospace; background: rgba(0,0,0,0.3); padding: 2px 4px; border-radius: 4px; }
        .message-content p { margin-bottom: 8px; }
        .message-content p:last-child { margin-bottom: 0; }

        .user-msg { background-color: var(--msg-user); color: var(--msg-user-text); align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-msg { background-color: var(--msg-ai); color: var(--msg-ai-text); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--msg-ai-border); box-shadow: var(--glow); }
        .system-status { font-size: 12px; color: var(--text-sub); align-self: center; font-style: italic; text-align: center; }
        
        .gen-image { width: 100%; max-width: 320px; border-radius: 12px; margin-top: 8px; display: block; border: 1px solid var(--border-color); }

        #sidebar-overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 9; }
        #sidebar-overlay.show { display: block; }

        #settings-modal {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-sidebar);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            z-index: 20;
            width: 92%;
            max-width: 420px;
            max-height: 85%;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        #settings-modal h3 { margin-bottom: 8px; font-size: 16px; }
        #settings-modal label { font-size: 12px; color: var(--text-sub); display: block; margin-top: 8px; margin-bottom: 4px; }
        #settings-modal textarea {
            width: 100%;
            background: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px;
            font-family: inherit;
            resize: none;
            outline: none;
            font-size: 13px;
        }
        #system-prompt-input { height: 70px; }
        #lore-bank-input { height: 90px; }
        #story-tracker-input { height: 90px; }

        #input-panel { padding: 12px 16px; background: var(--bg-input-panel); border-top: 1px solid var(--border-color); display: flex; gap: 8px; align-items: center; }
        #user-input { flex: 1; background-color: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-main); padding: 12px 16px; border-radius: 24px; font-size: 15px; outline: none; user-select: text; }
        #user-input:focus { border-color: var(--accent); }

        #mic-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #mic-btn.active { background-color: #ef4444; border-color: #ef4444; color: white; animation: pulse 1.5s infinite; }

        #send-btn { background-color: var(--accent); color: #ffffff; border: none; padding: 12px 20px; border-radius: 24px; font-weight: 600; cursor: pointer; box-shadow: var(--glow); }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>

                if(appState.selectedModel) modelSelector.value = appState.selectedModel;
            } else {

            }
            systemPromptInput.value = appState.systemPrompt;

        function saveState() {
            localStorage.setItem('nexus_ai_state_v4', JSON.stringify(appState));

        function changeModel() {
            appState.selectedModel = modelSelector.value;
            saveState();
            appendMessageUI(`System: Matrix locked to processing core [${modelSelector.value}]`, 'system-status');
        }

        function toggleSidebar() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        function toggleSettings() {
            systemPromptInput.value = appState.systemPrompt;
            loreBankInput.value = appState.loreBank;
            storyTrackerInput.value = appState.storyTracker;
            settingsModal.style.display = settingsModal.style.display === 'block' ? 'none' : 'block';
        }

        function saveSettings() {
            appState.systemPrompt = systemPromptInput.value;
            appState.loreBank = loreBankInput.value;
            appState.storyTracker = storyTrackerInput.value;
            saveState();
            toggleSettings();
            appendMessageUI("System: Lore & State matrix arrays synchronized.", 'system-status');

        function clearMemories() {
            if(confirm("Wipe dual core memory banks?")) {

            }
        }

        function toggleTheme() {
            if (document.body.getAttribute('data-theme') === 'light') {
                document.body.setAttribute('data-theme', 'dark');
                appState.theme = 'dark';
                themeToggle.textContent = '☀️ LIGHT';
            } else {
                document.body.setAttribute('data-theme', 'light');
                appState.theme = 'light';
                themeToggle.textContent = '🌙 DARK';
            }
            saveState();
        }

        function createNewChat() {
            const id = 'chat_' + Date.now();
            appState.chats[id] = {
                name: 'New Story Arc',
                messages: [{role: 'assistant', content: 'Story matrices active. Swap to Dolphin 24B for unrestricted sandbox output, or tap 🧠 BRAIN to set your lore registers.'}]
            };
            appState.currentChatId = id;
            saveState();
            renderChatsList();
            loadChat(id);
        }

        function loadChat(id) {
            appState.currentChatId = id;
            chatContainer.innerHTML = '';

            if (activeChat) {
                activeChat.messages.forEach(msg => {
                    if (msg.role === 'user') {
                        appendMessageUI(msg.content, 'user-msg');
                    } else if (msg.role === 'assistant') {
                        appendMessageUI(msg.content, 'ai-msg', msg.imgUrl);
                    }
                });
            }
            renderChatsList();
            saveState();
        }

        function deleteChat(id, event) {
            event.stopPropagation();
            delete appState.chats[id];
            const keys = Object.keys(appState.chats);
            if (keys.length === 0) {
                createNewChat();
            } else if (appState.currentChatId === id) {
                loadChat(keys[0]);
            } else {
                renderChatsList();
                saveState();
            }
        }

        function renderChatsList() {
            chatsList.innerHTML = '';
            Object.keys(appState.chats).forEach(id => {
                const item = document.createElement('div');
                item.className = `chat-history-item ${id === appState.currentChatId ? 'active' : ''}`;
                item.onclick = () => loadChat(id);
                
                const nameSpan = document.createElement('span');
                nameSpan.textContent = appState.chats[id].name;
                
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-chat-btn';
                delBtn.textContent = '✕';
                delBtn.onclick = (e) => deleteChat(id, e);
                
                item.appendChild(nameSpan);
                item.appendChild(delBtn);
                chatsList.appendChild(item);
            });
        }
