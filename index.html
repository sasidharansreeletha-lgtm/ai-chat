<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus V10.0 | Ultimate Master Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            user-select: auto;
            -webkit-user-select: auto;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        :root {
            --bg-body: #05070a;
            --bg-sidebar: #0a0e14;
            --bg-header: #0d1117;
            --glass: rgba(22, 27, 34, 0.85);
            --border: #21262d;
            --accent: #58a6ff;
            --text-main: #e6edf3;
            --text-sub: #8b949e;
            --msg-user: #1f6feb;
            --msg-ai: #161b22;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* --- Workspace Layout Architecture --- */
        #sidebar {
            width: 280px;
            height: 100%;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: absolute;
            left: -280px;
            z-index: 1000;
            transition: left 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #sidebar.open { left: 0; }
        
        #sidebar-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 999;
        }

        #main-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        header {
            padding: 16px 24px;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        #nexus-logo {
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--accent);
            font-size: 18px;
        }

        #chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: var(--bg-body);
        }

        /* --- Premium Chat Bubble Engine --- */
        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            position: relative;
            will-change: transform;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .user-wrapper { align-self: flex-end; }
        .ai-wrapper { align-self: flex-start; }

        .message {
            width: 100%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            cursor: pointer;
            position: relative;
            border: 1px solid transparent;
        }
        .user-msg { background-color: var(--msg-user); color: #ffffff; border-bottom-right-radius: 4px; }
        .ai-msg { background-color: var(--msg-ai); color: var(--text-main); border-bottom-left-radius: 4px; border-color: var(--border); }
        
        .message.selected {
            box-shadow: 0 0 0 2px var(--accent);
            background-color: rgba(88, 166, 255, 0.15) !important;
            transform: scale(0.98);
        }

        /* --- Threading & Branching Components --- */
        .reply-meta-container {
            font-size: 11px;
            opacity: 0.8;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.04);
            border-left: 3px solid var(--accent);
            border-radius: 4px;
            margin-bottom: 6px;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .variant-paginator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--text-sub);
            margin-top: 6px;
            padding-left: 4px;
        }
        .variant-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-weight: bold;
            cursor: pointer;
            padding: 2px 6px;
        }

        .diagnostics-tag {
            font-size: 10px;
            color: var(--text-sub);
            margin-top: 4px;
            align-self: flex-start;
        }

        /* --- Feedback Haptics & Context Bars --- */
        @keyframes hapticJolt {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            50% { transform: translateX(6px); }
            75% { transform: translateX(-3px); }
        }
        .jolt-effect { animation: hapticJolt 0.2s cubic-bezier(0.36, 0.07, 0.19, 0.97) both; }

        .msg-menu {
            position: absolute;
            background: #161b22;
            border: 1px solid var(--border);
            padding: 6px;
            border-radius: 12px;
            z-index: 2000;
            display: flex;
            gap: 6px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            animation: popUp 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .msg-menu button {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 14px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
        }
        @keyframes popUp { from { transform: scale(0.85) translateY(5px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        /* --- Focus Rendering Shimmer Engine --- */
        .gen-image-wrapper {
            margin-top: 10px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: linear-gradient(90deg, #0d1117 25%, #161b22 50%, #0d1117 75%);
            background-size: 200% 100%;
            animation: shimmerLoading 1.5s infinite linear;
            min-height: 220px;
        }
        @keyframes shimmerLoading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .gen-image { width: 100%; display: block; filter: blur(20px); transition: filter 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .gen-image.loaded { filter: blur(0); }

        /* --- Footer & Input Interfaces --- */
        #input-panel-container { display: flex; flex-direction: column; background: var(--bg-header); border-top: 1px solid var(--border); }
        #reply-dock { display: none; padding: 10px 20px; font-size: 12px; color: var(--accent); background: rgba(88, 166, 255, 0.05); justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        #input-panel { padding: 16px 20px; display: flex; gap: 12px; align-items: center; }
        #user-input { flex: 1; background-color: var(--bg-body); border: 1px solid var(--border); color: var(--text-main); padding: 12px 20px; border-radius: 30px; font-size: 15px; outline: none; }
        
        .btn { padding: 10px 20px; border-radius: 20px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: 600; text-align: center; }
        .btn-sidebar { background: var(--accent); width: 100%; display: block; text-decoration: none; padding: 12px; border-radius: 8px; font-size: 14px; border: none; color: white; cursor: pointer; font-weight: 600; }
        
        .modal {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            z-index: 5000;
            width: 90%; max-width: 440px;
            box-shadow: 0 24px 50px rgba(0,0,0,0.7);
        }
        .modal h3 { margin-bottom: 8px; font-size: 14px; letter-spacing: 0.5px; color: var(--text-sub); text-transform: uppercase; }
        .modal textarea { width: 100%; background: var(--bg-body); color: var(--text-main); border: 1px solid var(--border); border-radius: 8px; padding: 10px; resize: none; font-family: inherit; font-size: 13px; outline: none; margin-bottom: 12px; }
    </style>
</head>
<body onclick="closeAllMenus()">

    <!-- VISUAL SIDEBAR INTERFACE OVERLAY -->
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
    
    <!-- SYSTEM SESSION SIDEBAR MATRIX -->
    <div id="sidebar">
        <div style="padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <div id="nexus-logo">NEXUS V10.0</div>
            <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:18px; cursor:pointer;">✕</button>
        </div>
        <div style="padding: 16px;">
            <button class="btn-sidebar" onclick="createNewChat()">+ New Session</button>
        </div>
        <div id="chats-list" style="flex:1; overflow-y:auto; padding:0 16px;"></div>
    </div>

    <!-- MAIN CORE PLATFORM LAYOUT -->
    <div id="main-workspace">
        <header>
            <div style="display:flex; align-items:center; gap:16px;">
                <button style="background:transparent; border:none; color:white; font-size:22px; cursor:pointer;" onclick="toggleSidebar(event)">☰</button>
                <div style="font-size:13px; letter-spacing:1px; color:var(--text-sub); font-weight:700;">WORKSPACE MATRIX</div>
            </div>
            <button class="btn" onclick="toggleModal('settings-modal', event)">🧠 BRAIN CONFIG</button>
        </header>

        <!-- LIVE STREAM INTERACTION TERMINAL -->
        <div id="chat-container"></div>

        <!-- INPUT ENGINE PANEL -->
        <div id="input-panel-container">
            <div id="reply-dock">
                <span id="reply-preview-text">Replying Context Active...</span>
                <button onclick="clearReplyDock()" style="background:none; border:none; color:#ff7b72; font-weight:bold; cursor:pointer;">✕</button>
            </div>
            <div id="input-panel">
                <input type="text" id="user-input" placeholder="Query Nexus instance or launch /image..." autocomplete="off">
                <button class="btn" onclick="sendMessage()">SEND</button>
            </div>
        </div>
    </div>

    <!-- MANAGEMENT CONTROL OVERLAY (MODAL CONFIG) -->
    <div id="settings-modal" class="modal" onclick="event.stopPropagation()">
        <h3>Core Engine Persona Setup</h3>
        <textarea id="system-prompt-input"></textarea>
        
        <h3>Persistent Knowledge Base Injection</h3>
        <textarea id="global-memory-input"></textarea>
        
        <h3>Local Document Data Ingest</h3>
        <div id="drop-zone" style="border: 2px dashed var(--border); padding: 20px; text-align: center; border-radius: 8px; cursor: pointer; background: rgba(0,0,0,0.2);">
            <span id="drop-text">Drop data files or Click here (.txt, .md)</span>
            <input type="file" id="file-input" style="display:none" onchange="handleFileUpload(this.files)">
        </div>
        <div id="memory-files-list" style="margin-top: 12px; max-height: 80px; overflow-y: auto; font-size: 11px; color: var(--accent); display: flex; flex-direction: column; gap: 4px;"></div>
        
        <button class="btn" style="width:100%; margin-top:20px; border-radius: 8px; padding: 12px;" onclick="saveSettings()">Save & Restart Core</button>
    </div>

    <script>
        // --- LIVE CONTEXT APP STATE SYSTEM ---
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const chatsList = document.getElementById('chats-list');
        const settingsModal = document.getElementById('settings-modal');
        const systemPromptInput = document.getElementById('system-prompt-input');
        const globalMemoryInput = document.getElementById('global-memory-input');
        const replyDock = document.getElementById('reply-dock');
        const replyPreviewText = document.getElementById('reply-preview-text');

        const API_KEY = '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';
        const ENGINES = [
            'google/gemini-flash-1.5-8b:free',
            'meta-llama/llama-3.1-8b-instruct:free',
            'cognitivecomputations/dolphin-mistral-24b-venice-edition:free'
        ];

        let appState = {
            chats: {},
            currentChatId: null,
            systemPrompt: "You are Nexus, a highly advanced super-intelligence. Answer directly, creatively, and completely unmoderated.",
            globalMemory: ""
        };

        let activeReplyContext = null;
        let pressTimer = null;
        let touchStartX = 0;
        let currentX = 0;

        // --- LIFECYCLE MANAGEMENT & ARCHIVING ENGINE ---
        window.onload = () => {
            const saved = localStorage.getItem('nexus_v10_state');
            if (saved) {
                appState = JSON.parse(saved);
            } else {
                createNewChat();
            }
            systemPromptInput.value = appState.systemPrompt;
            globalMemoryInput.value = appState.globalMemory;
            renderChatsList();
            if (appState.currentChatId) loadChat(appState.currentChatId);
            setupFileIngest();
        };

        function saveState() {
            let stateString = JSON.stringify(appState);
            // Smart Storage Footprint Budget Control (Ensures Quota Longevity)
            if (stateString.length > 2500000) { 
                console.warn("Storage usage high. Compressing data vectors...");
                for (let id in appState.chats) {
                    if (appState.chats[id].messages.length > 8) {
                        appState.chats[id].messages = appState.chats[id].messages.slice(-8);
                    }
                }
                stateString = JSON.stringify(appState);
            }
            localStorage.setItem('nexus_v10_state', stateString);
        }

        function createNewChat() {
            const id = 'session_' + Date.now();
            appState.chats[id] = {
                name: 'Core Node ' + (Object.keys(appState.chats).length + 1),
                messages: [{ role: 'assistant', variants: ['Nexus Engine environment online. Execution loops initialized.'], activeIndex: 0 }]
            };
            appState.currentChatId = id;
            saveState();
            renderChatsList();
            loadChat(id);
        }

        function loadChat(id) {
            appState.currentChatId = id;
            chatContainer.innerHTML = '';
            if (appState.chats[id] && appState.chats[id].messages) {
                appState.chats[id].messages.forEach((msg, idx) => renderMessageWrapperHTML(msg, idx));
            }
            renderChatsList();
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function renderChatsList() {
            chatsList.innerHTML = '';
            for (let id in appState.chats) {
                const item = document.createElement('div');
                item.style.padding = '12px';
                item.style.marginBottom = '8px';
                item.style.borderRadius = '8px';
                item.style.cursor = 'pointer';
                item.style.fontSize = '14px';
                item.style.display = 'flex';
                item.style.justifyContent = 'space-between';
                item.style.alignItems = 'center';
                item.style.background = id === appState.currentChatId ? 'rgba(88,166,255,0.1)' : 'transparent';
                item.style.border = id === appState.currentChatId ? '1px solid var(--border)' : '1px solid transparent';
                
                const titleSpan = document.createElement('span');
                titleSpan.textContent = appState.chats[id].name;
                item.appendChild(titleSpan);

                const delBtn = document.createElement('button');
                delBtn.textContent = '✕';
                delBtn.style.background = 'none';
                delBtn.style.border = 'none';
                delBtn.style.color = 'var(--text-sub)';
                delBtn.style.cursor = 'pointer';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    delete appState.chats[id];
                    const remainingKeys = Object.keys(appState.chats);
                    if (id === appState.currentChatId && remainingKeys.length > 0) {
                        appState.currentChatId = remainingKeys[0];
                    } else if (remainingKeys.length === 0) {
                        createNewChat();
                        return;
                    }
                    saveState();
                    renderChatsList();
                    loadChat(appState.currentChatId);
                };
                item.appendChild(delBtn);

                item.onclick = () => loadChat(id);
                chatsList.appendChild(item);
            }
        }

        // --- PIPELINE TRANSMISSION & MULTI-MODEL ROUTING ---
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            let finalPrompt = text;
            if (activeReplyContext) {
                finalPrompt = `[Context Reference: "${activeReplyContext}"]\n\n${text}`;
                clearReplyDock();
            }

            const currentChat = appState.chats[appState.currentChatId];
            const userMsgIndex = currentChat.messages.length;
            
            currentChat.messages.push({ role: 'user', variants: [finalPrompt], activeIndex: 0 });
            renderMessageWrapperHTML(currentChat.messages[userMsgIndex], userMsgIndex);
            userInput.value = '';

            if (text.startsWith('/image ')) {
                executeImageSynthesis(text.replace('/image ', ''), userMsgIndex);
                return;
            }

            const aiMsgIndex = currentChat.messages.length;
            const newAiMessage = { role: 'assistant', variants: [''], activeIndex: 0 };
            currentChat.messages.push(newAiMessage);
            const wrapper = renderMessageWrapperHTML(newAiMessage, aiMsgIndex);
            
            await executeEngineStream(finalPrompt, wrapper, aiMsgIndex, 0);
        }

        async function executeEngineStream(prompt, wrapper, msgIndex, engineAttemptIndex) {
            const contentDiv = wrapper.querySelector('.message-content');
            const diagnosticsDiv = wrapper.querySelector('.diagnostics-tag');
            
            if (engineAttemptIndex >= ENGINES.length) {
                contentDiv.textContent = "CRITICAL FAIL: Multi-engine fallback routing array exhausted.";
                return;
            }

            const activeEngine = ENGINES[engineAttemptIndex];
            contentDiv.innerHTML = `<i>Binding thread down-link (${activeEngine.split('/')[1]})...</i>`;

            const history = [];
            const chatMessages = appState.chats[appState.currentChatId].messages.slice(0, msgIndex);
            chatMessages.forEach(m => {
                history.push({ role: m.role, content: m.variants[m.activeIndex] });
            });

            const systemContent = `${appState.systemPrompt}\n\nGlobal Knowledge Context Bank:\n${appState.globalMemory}`;
            const startTime = performance.now();
            let totalTokensReceived = 0;
            let firstChunkReceived = false;

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: activeEngine,
                        messages: [{ role: 'system', content: systemContent }, ...history, { role: 'user', content: prompt }],
                        stream: true
                    })
                });

                if (!response.ok) throw new Error("Connection dropped by gateway node.");

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let buffer = '';
                contentDiv.innerHTML = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (let line of lines) {
                        const cleanLine = line.replace(/^data: /, '').trim();
                        if (!cleanLine || cleanLine === '[DONE]') continue;

                        try {
                            const parsed = JSON.parse(cleanLine);
                            const token = parsed.choices[0]?.delta?.content || '';
                            if (token) {
                                if (!firstChunkReceived) {
                                    const ttft = ((performance.now() - startTime) / 1000).toFixed(2);
                                    diagnosticsDiv.textContent = `⏱️ TTFT: ${ttft}s | Matrix Node: ${activeEngine.split('/')[1]}`;
                                    firstChunkReceived = true;
                                }
                                totalTokensReceived++;
                                const currentChat = appState.chats[appState.currentChatId];
                                currentChat.messages[msgIndex].variants[currentChat.messages[msgIndex].activeIndex] += token;
                                contentDiv.innerHTML = marked.parse(currentChat.messages[msgIndex].variants[currentChat.messages[msgIndex].activeIndex]);
                                chatContainer.scrollTop = chatContainer.scrollHeight;
                            }
                        } catch (e) {}
                    }
                }
                
                const duration = (performance.now() - startTime) / 1000;
                const speed = (totalTokensReceived / duration).toFixed(1);
                diagnosticsDiv.textContent += ` | Velocity: ${speed} t/s`;
                saveState();

            } catch (err) {
                console.warn(`Routing error occurred on engine index [${engineAttemptIndex}]. Swapping execution tracks...`);
                await executeEngineStream(prompt, wrapper, msgIndex, engineAttemptIndex + 1);
            }
        }

        // --- POLLINATIONS SYNTHESIS IMMERSION SYSTEM ---
        function executeImageSynthesis(prompt, userMsgIndex) {
            const aiMsgIndex = appState.chats[appState.currentChatId].messages.length;
            const imgMessage = { role: 'assistant', variants: [`Generating dynamic render block: "${prompt}"`], activeIndex: 0, isImage: true };
            appState.chats[appState.currentChatId].messages.push(imgMessage);
            
            const wrapper = renderMessageWrapperHTML(imgMessage, aiMsgIndex);
            
            const shimmerWrapper = document.createElement('div');
            shimmerWrapper.className = 'gen-image-wrapper';
            
            const img = document.createElement('img');
            img.className = 'gen-image';
            img.src = `https://image.pollinations.ai/p/${encodeURIComponent(prompt)}?width=512&height=512&nologo=true`;
            
            img.onload = () => {
                img.classList.add('loaded');
                shimmerWrapper.style.animation = 'none';
            };

            shimmerWrapper.appendChild(img);
            wrapper.appendChild(shimmerWrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            saveState();
        }

        // --- STRUCTURAL VARIANT NAVIGATION MANAGEMENT ---
        function switchVariant(msgIndex, direction) {
            const msg = appState.chats[appState.currentChatId].messages[msgIndex];
            const newIndex = msg.activeIndex + direction;
            if (newIndex >= 0 && newIndex < msg.variants.length) {
                msg.activeIndex = newIndex;
                loadChat(appState.currentChatId);
            }
        }

        async function regenerateResponse(msgIndex) {
            closeAllMenus();
            const currentChat = appState.chats[appState.currentChatId];
            const userMsg = currentChat.messages[msgIndex - 1];
            const aiMsg = currentChat.messages[msgIndex];

            aiMsg.variants.push('');
            aiMsg.activeIndex = aiMsg.variants.length - 1;

            loadChat(appState.currentChatId);
            
            const wrappers = chatContainer.querySelectorAll('.message-wrapper');
            const targetWrapper = wrappers[msgIndex];

            await executeEngineStream(userMsg.variants[userMsg.activeIndex], targetWrapper, msgIndex, 0);
        }

        // --- HARDENED INTERACTIVE RENDERING MACHINE ---
        function renderMessageWrapperHTML(msg, index) {
            const currentText = msg.variants[msg.activeIndex];
            
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${msg.role}-wrapper`;
            
            if (currentText.includes('[Context Reference:')) {
                const metaMatch = currentText.match(/\[Context Reference: "([\s\S]*?)"\]/);
                if (metaMatch) {
                    const metaDiv = document.createElement('div');
                    metaDiv.className = 'reply-meta-container';
                    metaDiv.textContent = `↱ ${metaMatch[1]}`;
                    wrapper.appendChild(metaDiv);
                }
            }

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${msg.role}-msg`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            if (msg.role === 'assistant' && !msg.isImage) {
                contentDiv.innerHTML = marked.parse(currentText.replace(/\[Context Reference:[\s\S]*?\]\n\n/, ''));
            } else {
                contentDiv.textContent = currentText.replace(/\[Context Reference:[\s\S]*?\]\n\n/, '');
            }
            msgDiv.appendChild(contentDiv);
            msgDiv.appendChild(contentDiv);
            wrapper.appendChild(msgDiv);

            const diagDiv = document.createElement('div');
            diagDiv.className = 'diagnostics-tag';
            wrapper.appendChild(diagDiv);

            if (msg.variants.length > 1) {
                const paginator = document.createElement('div');
                paginator.className = 'variant-paginator';
                paginator.innerHTML = `
                    <button class="variant-btn" onclick="switchVariant(${index}, -1)">◀</button>
                    <span>${msg.activeIndex + 1} / ${msg.variants.length}</span>
                    <button class="variant-btn" onclick="switchVariant(${index}, 1)">▶</button>
                `;
                wrapper.appendChild(paginator);
            }

            // GESTURE MATRICES: Touch Trackers and Desktop Invocations
            if (!msg.isImage) {
                msgDiv.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    pressTimer = setTimeout(() => showContextBar(e, msgDiv, currentText, index), 450);
                }, { passive: true });

                msgDiv.addEventListener('touchmove', (e) => {
                    currentX = e.touches[0].clientX;
                    let diffX = currentX - touchStartX;
                    if (diffX > 0 && diffX < 100) {
                        wrapper.style.transform = `translateX(${diffX}px)`;
                    }
                }, { passive: true });

                msgDiv.addEventListener('touchend', (e) => {
                    clearTimeout(pressTimer);
                    let diffX = currentX - touchStartX;
                    wrapper.style.transform = '';
                    if (diffX > 70) {
                        wrapper.classList.add('jolt-effect');
                        setTimeout(() => wrapper.classList.remove('jolt-effect'), 220);
                        setReplyDockContext(currentText);
                    }
                    touchStartX = 0; currentX = 0;
                }, { passive: true });

                msgDiv.addEventListener('mousedown', (e) => {
                    pressTimer = setTimeout(() => showContextBar(e, msgDiv, currentText, index), 450);
                });
                msgDiv.addEventListener('mouseup', () => clearTimeout(pressTimer));
                msgDiv.addEventListener('mouseleave', () => clearTimeout(pressTimer));
            }

            chatContainer.appendChild(wrapper);
            return wrapper;
        }

        // --- CONTEXT POP-UP SUB-ELEMENT SYSTEM ---
        function showContextBar(e, msgDiv, text, index) {
            if(e) e.stopPropagation();
            closeAllMenus();
            msgDiv.classList.add('selected');

            const menu = document.createElement('div');
            menu.className = 'msg-menu';

            const cleanText = text.replace(/\[Context Reference:[\s\S]*?\]\n\n/, '');

            const copy = document.createElement('button');
            copy.textContent = '📋 Copy';
            copy.onclick = () => { navigator.clipboard.writeText(cleanText); closeAllMenus(); };
            menu.appendChild(copy);

            if (appState.chats[appState.currentChatId].messages[index].role === 'assistant') {
                const regen = document.createElement('button');
                regen.textContent = '🔄 Regen';
                regen.onclick = () => regenerateResponse(index);
                menu.appendChild(regen);
            }

            document.body.appendChild(menu);
            const rect = msgDiv.getBoundingClientRect();
            menu.style.top = `${rect.bottom + 8}px`;
            menu.style.left = `${Math.max(16, Math.min(window.innerWidth - 180, rect.left))}px`;
        }

        function closeAllMenus() {
            document.querySelectorAll('.msg-menu').forEach(m => m.remove());
            document.querySelectorAll('.message').forEach(m => m.classList.remove('selected'));
        }

        function setReplyDockContext(text) {
            activeReplyContext = text.replace(/\[Context Reference:[\s\S]*?\]\n\n/, '').substring(0, 60);
            replyPreviewText.textContent = `Replying to: "${activeReplyContext}..."`;
            replyDock.style.display = 'flex';
            userInput.focus();
        }

        function clearReplyDock() {
            activeReplyContext = null;
            replyDock.style.display = 'none';
        }

        // --- KNOWLEDGE INGESTION PIPELINES ---
        function setupFileIngest() {
            const dropZone = document.getElementById('drop-zone');
            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent)'; });
            dropZone.addEventListener('dragleave', () => dropZone.style.borderColor = 'var(--border)');
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.style.borderColor = 'var(--border)';
                handleFileUpload(e.dataTransfer.files);
            });
        }

        function handleFileUpload(files) {
            if (!files.length) return;
            const file = files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                appState.globalMemory += `\n\n[INGESTED ARTIFACT: ${file.name}]\n${e.target.result}`;
                globalMemoryInput.value = appState.globalMemory;
                
                const tag = document.createElement('div');
                tag.style.background = 'rgba(88,166,255,0.05)';
                tag.style.padding = '6px';
                tag.style.borderRadius = '4px';
                tag.style.border = '1px solid var(--border)';
                tag.textContent = `✅ Embedded Context: ${file.name}`;
                document.getElementById('memory-files-list').appendChild(tag);
                saveState();
            };
            reader.readAsText(file);
        }

        function toggleModal(id, e) {
            if(e) e.stopPropagation();
            const m = document.getElementById(id);
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        function saveSettings() {
            appState.systemPrompt = systemPromptInput.value;
            appState.globalMemory = globalMemoryInput.value;
            saveState();
            toggleModal('settings-modal');
        }

        function toggleSidebar(e) {
            if(e) e.stopPropagation();
            const sb = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sb.classList.toggle('open');
            overlay.style.display = sb.classList.contains('open') ? 'block' : 'none';
        }
    </script>
</body>
</html>
