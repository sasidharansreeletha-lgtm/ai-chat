<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Nexus AI</title>
    <style>
        /* Block text highlighting and copying */
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        :root {
            --bg-body: #0b0f19;
            --bg-header: #151b26;
            --border-color: #2d3748;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --bg-chat: #0b0f19;
            --bg-input-panel: #151b26;
            --bg-input: #0f172a;
            --msg-user: #2563eb;
            --msg-user-text: #ffffff;
            --msg-ai: #1e293b;
            --msg-ai-text: #f1f5f9;
            --msg-ai-border: rgba(255, 255, 255, 0.05);
        }

        [data-theme="light"] {
            --bg-body: #ffffff;
            --bg-header: #f8f9fa;
            --border-color: #dadce0;
            --text-main: #202124;
            --text-sub: #5f6368;
            --bg-chat: #ffffff;
            --bg-input-panel: #f8f9fa;
            --bg-input: #ffffff;
            --msg-user: #1a73e8;
            --msg-user-text: #ffffff;
            --msg-ai: #f1f3f4;
            --msg-ai-text: #202124;
            --msg-ai-border: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
        }

        #theme-toggle {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        #chat-container {
            flex: 1;
            width: 100%;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-color: var(--bg-chat);
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message-content {
            user-select: text;
            -webkit-user-select: text;
        }

        .user-msg {
            background-color: var(--msg-user);
            color: var(--msg-user-text);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai-msg {
            background-color: var(--msg-ai);
            color: var(--msg-ai-text);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--msg-ai-border);
        }

        .system-status {
            font-size: 12px;
            color: var(--text-sub);
            align-self: center;
            font-style: italic;
        }

        #input-panel {
            padding: 12px 16px;
            background: var(--bg-input-panel);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #user-input {
            flex: 1;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            user-select: text;
            -webkit-user-select: text;
        }

        #send-btn {
            background-color: #1a73e8;
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            border-radius: 24px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>NEXUS AI ASSISTANT</h1>
        <button id="theme-toggle" onclick="toggleTheme()">☀️ LIGHT</button>
    </header>

    <div id="chat-container">
        <div class="message ai-msg">
            <div class="message-content">Hello! I am your web-hosted enterprise AI engine. Ask me anything.</div>
        </div>
    </div>

    <div id="input-panel">
        <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
        <button id="send-btn" onclick="sendMessage()">SEND</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const themeToggle = document.getElementById('theme-toggle');

        function toggleTheme() {
            if (document.body.getAttribute('data-theme') === 'light') {
                document.body.removeAttribute('data-theme');
                themeToggle.textContent = '☀️ LIGHT';
            } else {
                document.body.setAttribute('data-theme', 'light');
                themeToggle.textContent = '🌙 DARK';
            }
        }

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user-msg');
            userInput.value = '';

            const loadingDiv = appendMessage('AI is generating response...', 'system-status');

            try {
                // Pointing directly to the elite enterprise-level Qwen 72B engine framework
                const response = await fetch("https://huggingface.co", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: text })
                });

                const data = await response.json();
                loadingDiv.remove();

                // Structural verification pass on the return array strings
                if (Array.isArray(data) && data[0] && data[0].generated_text) {
                    let reply = data[0].generated_text;
                    
                    // Clean up echo prompt patterns if model duplicates user input
                    if (reply.startsWith(text)) {
                        reply = reply.substring(text.length).trim();
                    }
                    appendMessage(reply || "Processed successfully, but returned blank data layout.", 'ai-msg');
                } else if (data.error && data.error.includes("loading")) {
                    appendMessage("The server model is warming up its processors. Please try again in 15 seconds.", 'ai-msg');
                } else {
                    appendMessage("The AI server engine is currently under high traffic load. Please resend in a brief moment.", 'ai-msg');
                }

            } catch (error) {
                loadingDiv.remove();
                appendMessage('Network block detected. Ensure you are running this app from your public web URL link.', 'ai-msg');
                console.error(error);
            }
        }

        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            msgDiv.appendChild(contentDiv);
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv;
        }
    </script>
</body>
</html>
