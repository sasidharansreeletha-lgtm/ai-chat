<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus V4.3 Full Upgrade</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* CRITICAL TOUCH FIX: Removing all restrictive CSS */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #070a13; color: white; font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
        
        #sidebar { width: 260px; height: 100%; background: #0f1423; position: absolute; left: -260px; z-index: 9999; transition: 0.3s; border-right: 1px solid #1e294b; }
        #sidebar.open { left: 0; }
        
        #main-workspace { display: flex; flex-direction: column; width: 100%; height: 100%; }
        header { padding: 15px; background: #13192e; display: flex; justify-content: space-between; align-items: center; }
        
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 12px; border-radius: 12px; background: #1e293b; max-width: 90%; }
        
        #input-panel { padding: 15px; background: #13192e; display: flex; gap: 10px; align-items: center; border-top: 1px solid #1e294b; }
        input { flex: 1; padding: 15px; border-radius: 25px; background: #0b0f19; border: 1px solid #3b82f6; color: white; font-size: 16px; }
        button { padding: 15px 20px; border-radius: 25px; background: #3b82f6; color: white; border: none; font-weight: bold; cursor: pointer; }
        
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #070a13; padding: 20px; z-index: 9999; overflow-y: auto; }
        textarea { width: 100%; height: 100px; background: #13192e; color: white; border: 1px solid #3b82f6; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="padding: 20px;"><h3>NEXUS CHATS</h3><button onclick="document.getElementById('sidebar').classList.remove('open')">CLOSE</button></div>
        <div id="chats-list"></div>
    </div>

    <div id="main-workspace">
        <header>
            <button onclick="document.getElementById('sidebar').classList.add('open')">☰</button>
            <h1>NEXUS V4.3</h1>
            <button onclick="document.getElementById('settings-modal').style.display='block'">🧠 BRAIN</button>
        </header>

        <div id="chat-container"></div>

        <div id="input-panel">
            <button onclick="toggleVoice()">🎙️</button>
            <input type="text" id="user-input" placeholder="Type or /image...">
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <div id="settings-modal">
        <h3>Memory Banks</h3>
        <label>System Prompt</label><textarea id="sys-prompt">You are a creative storyteller.</textarea>
        <label>World Lore Ledger</label><textarea id="lore-bank"></textarea>
        <label>Plot Tracker</label><textarea id="plot-tracker"></textarea>
        <button onclick="document.getElementById('settings-modal').style.display='none'">SAVE & CLOSE</button>
    </div>

    <script>
        const API_KEY = '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';
        
        // Use 'click' for desktop/mobile cross-compatibility
        document.getElementById('send-btn').addEventListener('click', async () => {
            const input = document.getElementById('user-input');
            const chat = document.getElementById('chat-container');
            const text = input.value.trim();
            if (!text) return;

            const uMsg = document.createElement('div');
            uMsg.className = 'message user-msg';
            uMsg.textContent = text;
            chat.appendChild(uMsg);
            input.value = '';

            try {
                // Fetch with Full Memory Context
                const payload = {
                    model: "cognitivecomputations/dolphin-mistral-24b-venice-edition:free",
                    messages: [
                        { role: 'system', content: `${document.getElementById('sys-prompt').value}\nLore: ${document.getElementById('lore-bank').value}\nPlot: ${document.getElementById('plot-tracker').value}` },
                        { role: 'user', content: text }
                    ]
                };

                const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                const aiMsg = document.createElement('div');
                aiMsg.className = 'message';
                aiMsg.innerHTML = marked.parse(data.choices[0].message.content);
                chat.appendChild(aiMsg);
                chat.scrollTop = chat.scrollHeight;
            } catch (err) { alert("Error: " + err.message); }
        });

        function toggleVoice() { alert("Voice active"); }
    </script>
</body>
</html>
